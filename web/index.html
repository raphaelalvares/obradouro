<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: ao abrir o teclado no Android, encolhe o layout viewport
         (empurra o sheet `fixed` p/ cima do teclado). iOS ignora; só ajuda o Android. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <title>CRIA — Painel</title>
    <!-- Fontes (Oswald/Outfit) são self-hosted via @fontsource, importadas em src/main.tsx (B5).
         Sem <link> p/ fonts.googleapis/gstatic → a CSP do vercel.json usa font-src 'self'. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
