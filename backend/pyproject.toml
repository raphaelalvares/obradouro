# Apenas configuração de ferramentas. As dependências vivem em requirements*.txt
# (fonte de verdade para o Docker). Não empacotamos `app` como wheel.

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
